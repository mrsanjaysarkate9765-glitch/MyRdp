name: RDP

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */5 * * *"   # हर 5 घंटे बाद auto restart

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 350

    steps:
      - name: Prepare Storage Folder
        run: |
          New-Item -ItemType Directory -Path "C:\Persist" -Force
          Write-Host "Persistent folder created."

      - name: Install rclone
        run: |
          Invoke-WebRequest -Uri "https://downloads.rclone.org/rclone-current-windows-amd64.zip" -OutFile "$env:TEMP\rclone.zip"
          Expand-Archive "$env:TEMP\rclone.zip" "$env:TEMP\rclone"
          Copy-Item "$env:TEMP\rclone\rclone-*\rclone.exe" "C:\Windows\System32\" -Force
          Write-Host "Rclone installed."

      - name: Create rclone.conf
        run: |
          $path = "$env:USERPROFILE\.config\rclone"
          New-Item -ItemType Directory -Path $path -Force
          Set-Content -Path "$path\rclone.conf" -Value "${{ secrets.RCLONE_CONF }}"
          Write-Host "rclone.conf created."

      - name: Restore Data from Google Drive
        run: |
          Write-Host "Restoring persistent data..."
          rclone copy mydrive:/persist C:\Persist --ignore-checksum --progress --transfers=8 --checkers=16 || Write-Host "No backup found."

      - name: Enable RDP Access
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389
          Restart-Service TermService -Force

      - name: Create User with Fixed Password
        run: |
          $password = "${{ secrets.RDP_PASS }}"
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          if (-not (Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue)) {
              New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          } else {
              Set-LocalUser -Name "RDP" -Password $securePass
          }
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          echo "RDP_USER=RDP" >> $env:GITHUB_ENV
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV

      - name: Install Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installer = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installer
          Start-Process msiexec.exe -ArgumentList "/i "$installer" /quiet /norestart" -Wait
          Remove-Item $installer

      - name: Connect Tailscale
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-${{ github.run_id }}
          $ts = $null
          $retry = 0
          while (-not $ts -and $retry -lt 10) {
              $ts = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              Start-Sleep 5
              $retry++
          }
          echo "TS_IP=$ts" >> $env:GITHUB_ENV
          Write-Host "Tailscale IP = $ts"

      - name: Show RDP Details
        run: |
          Write-Host "==============================="
          Write-Host "      RDP DETAILS"
          Write-Host "Tailscale IP: $env:TS_IP"
          Write-Host "User: $env:RDP_USER"
          Write-Host "Pass: $env:RDP_PASS"
          Write-Host "==============================="

      - name: Keep RDP Alive (Approx 5 Hours)
        run: |
          for ($i=0; $i -lt 55; $i++) {
              Write-Host "[$(Get-Date)] RDP alive..."
              Start-Sleep -Seconds 300
          }

      - name: Backup Data to Google Drive
        if: always()
        run: |
          Write-Host "Uploading persistent folder..."
          rclone copy C:\Persist mydrive:/persist --ignore-checksum --progress --transfers=8 --checkers=16

      - name: Auto Restart Workflow
        if: always()
        run: |
          $headers = @{
            "Authorization" = "token ${{ secrets.GH_TOKEN }}"
            "Accept" = "application/vnd.github.v3+json"
          }
          $body = '{"ref":"main"}'
          Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/actions/workflows/main.yml/dispatches" -Headers $headers -Method POST -Body $body
          Write-Host "Auto Restart Triggered Successfully!"
